<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CUCMS | Centralised University Certificate Management System</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background-color: #f4f6f9; color: #333; }
        header { background-color: #2c3e50; color: white; padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; }
        .hero { padding: 60px 5%; text-align: center; background: white; border-bottom: 2px solid #ddd; }
        .hero h1 { font-size: 2.5rem; color: #2c3e50; }
        .btn-login { background-color: #3498db; color: white; padding: 10px 25px; border: none; border-radius: 5px; cursor: pointer; font-size: 1rem; }
        .btn-login:hover { background-color: #2980b9; }
        
        /* Modal Styles */
        .modal { display: none; position: fixed; z-index: 1; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); }
        .modal-content { background-color: white; margin: 10% auto; padding: 20px; border-radius: 8px; width: 350px; position: relative; }
        .close { position: absolute; right: 20px; top: 10px; font-size: 28px; cursor: pointer; }
        
        /* Form styling inside modal to match the reg-styles.css feel */
        .modal-content input, .modal-content select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .modal-content button { width: 100%; background-color: #27ae60; color: white; padding: 10px; border: none; border-radius: 4px; cursor: pointer; }

        .header-buttons {
    display: flex;
    gap: 10px;
    align-items: center;
}

.btn-link {
    background-color: #16a085;
    color: white;
    padding: 10px 20px;
    border-radius: 5px;
    text-decoration: none;
    font-size: 1rem;
    transition: background-color 0.3s ease;
}

.btn-link:hover {
    background-color: #138d75;
}

    </style>
</head>
<body>

<header>
    <div class="logo"><strong>CUCMS</strong> Kenya</div>
    <div class="header-buttons">
        <a href="student_login.html" class="btn-link">Print your certificate</a>
        <a href="verify.html" class="btn-link">Verify a certificate</a>
        <button class="btn-login" onclick="openModal()">Login to Portal</button>
    </div>
</header>


<div class="hero">
    <h1>Securing Academic Integrity</h1>
    <p>The Centralised University Certificate Management System (CUCMS) ensures that every degree issued in Kenya is verifiable, unique, and tamper-proof.</p>
</div>

<div id="loginModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h2 style="text-align:center">User Login</h2>
        <form action="login_process.php" method="POST" onsubmit="return validateLogin()">
            <label>Username</label>
            <input type="text" name="username" id="login_user" placeholder="Enter Username">
            
            <label>Password</label>
            <input type="password" name="password" id="login_pass" placeholder="Enter Password">
            
            <button type="submit">Login</button>
        </form>
    </div>
</div>

<script>
    function openModal() { document.getElementById("loginModal").style.display = "block"; }
    function closeModal() { document.getElementById("loginModal").style.display = "none"; }
    
    function validateLogin() {
        var u = document.getElementById("login_user").value;
        var p = document.getElementById("login_pass").value;
        if (u == "" || p == "") {
            alert("Both Username and Password are required");
            return false;
        }
        return true;
    }
</script>

</body>
</html>
