<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CUCMS - User Registration</title>
    <link rel="stylesheet" href="reg-styles.css">
    
    <script type="text/javascript">
        // Function to validate all fields before form submission
        function validateRegistration() {
            // 1. Validate Real Name
            var name = document.getElementById("real_name").value;
            if (name.length == 0) {
                alert("You must enter your Full Name");
                document.getElementById("real_name").focus();
                return false;
            }

            // 2. Validate Mobile Number (Checking if it's a number and correct length)
            var mobile = document.getElementById("phone").value;
            if (mobile.length != 9 || isNaN(mobile)) {
                alert("You must enter a valid mobile Number (9 digits)");
                document.getElementById("phone").focus();
                return false;
            }

            // 3. Validate Email (Checking for @ and .)
            var email = document.getElementById("email").value;
            if (email.length == 0 || email.indexOf("@") == -1 || email.indexOf(".") == -1) {
                alert("You must enter a valid email address");
                document.getElementById("email").focus();
                return false;
            }

            // 4. Validate Username
            var user = document.getElementById("username").value;
            if (user.length == 0) {
                alert("Please provide a username");
                document.getElementById("username").focus();
                return false;
            }

            // 5. Validate Password
            var pass = document.getElementById("password").value;
            if (pass.length != 8 ) {
                alert("Password must be exactly 8 characters long");
                document.getElementById("password").focus();
                return false;
            }

            // If all checks pass, the form submits to registration.php
            return true;
        }
    </script>
</head>
<body>
    <div class="form-container">
        <h2>User Registration</h2>
        <form action="registration.php" method="POST" onsubmit="return validateRegistration()">
            
            <label for="real_name">Full Name:</label>
            <input type="text" name="real_name" id="real_name" placeholder="Enter Full Name">
            
            <label for="phone">Phone Number:</label>
            <input type="text" name="phone" id="phone" placeholder="e.g. 712345678 (9 digits)">
            
            <label for="email">Email Address:</label>
            <input type="text" name="email" id="email" placeholder="example@domain.com">
            
            <label for="username">Username:</label>
            <input type="text" name="username" id="username" placeholder="Choose a username">
            
            <label for="password">Password:</label>
            <input type="password" name="password" id="password" placeholder="Enter password">
            
            <label for="role">User Role:</label>
            <select name="role" id="role">
                <option value="Admin">Admin</option>
                <option value="UniversityStaff">University Staff</option>
                <option value="Regulator">Regulator</option>
            </select>
            
            <button type="submit">Register User</button>
        </form>
    </div>
</body>
</html>
