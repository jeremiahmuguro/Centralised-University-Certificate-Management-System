<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register Student</title>
    <link rel="stylesheet" href="reg-styles.css">
    <script type="text/javascript">
        function validateStudent() {
            // Validate Name
            var name = document.getElementById("s_name").value;
            if (name == "") {
                alert("Student Name is required");
                document.getElementById("s_name").focus();
                return false;
            }

            // Validate Reg Number
            var reg = document.getElementById("reg_num").value;
            if (reg == "") {
                alert("Registration Number is required");
                document.getElementById("reg_num").focus();
                return false;
            }

            // Validate Email
            var email = document.getElementById("email").value;
            if (email.length == 0 || email.indexOf("@") == -1 || email.indexOf(".") == -1) {
                alert("Enter a valid Student Email");
                document.getElementById("email").focus();
                return false;
            }

                    // 6. Validate Course Name
            var course = document.getElementById("course_name").value;
            if (course.length == 0) {
                alert("Please enter the Course Name");
                document.getElementById("course_name").focus();
                return false;
            }

            // 7. Validate Admission Date
            var admDate = document.getElementById("adm_date").value;
            if (admDate == "") {
                alert("Admission Date is required");
                document.getElementById("adm_date").focus();
                return false;
    }

            return true;
        }
    </script>
</head>
<body style="height: auto; padding: 20px;">
    <div class="form-container" style="width: 400px;">
        <h2>Register New Student</h2>
        <form action="save_student.php" method="POST" onsubmit="return validateStudent()">
            <label>Full Name</label>
            <input type="text" name="s_name" id="s_name" placeholder="John Doe">

            <label>Registration Number</label>
            <input type="text" name="reg_num" id="reg_num" placeholder="e.g. 1062093">

            <label>Email Address</label>
            <input type="text" name="email" id="email" placeholder="student@univ.ac.ke">

            <label>Date of Admission</label>
            <input type="date" name="adm_date" id="adm_date">

            <label>Course Name</label>
            <input type="text" name="course_name" id="course_name" placeholder="e.g. Computer Science">

            <label>Level of Program</label>
            <select name="level">
                 
                <option value="Bachelor">Bachelor</option>
                <option value="Diploma">Diploma</option>
                <option value="Certificate">Certificate</option>
                <option value="Master">Master</option>
                <option value="PhD">PhD</option>
            </select>

            <label>University ID</label>
            <input type="number" name="uni_id" id="uni_id" placeholder="ID of your institution">

            <button type="submit">Register Student</button>
        </form>
    </div>
</body>
</html>
